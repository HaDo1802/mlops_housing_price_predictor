data:
  random_state: 42
  raw_data_path: data/raw/data_master.csv
  target_column: price
  test_size: 0.2
  val_size: 0.0
features:
  categorical:
  - propertytype
  numeric:
  - bedrooms
  - bathrooms
  - livingarea
  - latitude
  - longitude
model:
  cv_folds: 5
  hyperparameters:
    l2_regularization: 0.0
    learning_rate: 0.03
    max_iter: 1200
    max_leaf_nodes: 63
    min_samples_leaf: 8
  model_type: hist_gradient_boosting
  optimize_metric: r2
  random_state: 42
preprocessing:
  encode_categorical: true
  encoding_method: onehot
  handle_missing: mean
  handle_outliers: false
  outlier_iqr_multiplier: 1.5
  outlier_method: iqr
  outlier_min_livingarea: 100.0
  outlier_ppsf_max: 1000.0
  outlier_ppsf_min: 80.0
  scale_features: true
  scaling_method: standard
  target_transform: log1p
training:
  experiment_name: house_price_prediction_test_2
  log_dir: logs
  log_metrics: true
  model_output_dir: models/production
  registry_model_name: housing_price_predictor
  run_name: hgb_no_geo_tuned_v2
  save_artifacts: true
  track_experiments: true
