# Simplified Configuration for Single Model Training

# Data Configuration
data:
  raw_data_path: "data/raw/data_master.csv"
  target_column: "price"
  test_size: 0.2
  val_size: 0.0
  random_state: 42

features:
  numeric:
    - "bedrooms"
    - "bathrooms"
    - "livingarea"
    - "latitude"
    - "longitude"

  categorical:
    - "propertytype"

# Preprocessing Configuration
preprocessing:
  handle_missing: "mean"
  handle_outliers: false
  scale_features: true
  scaling_method: "standard"
  encode_categorical: true
  encoding_method: "onehot"
  target_transform: "log1p"
  interval_num_segments: 5
  interval_min_segment_size: 10

model:
  model_type: "hist_gradient_boosting"
  random_state: 42
  hyperparameters:
    learning_rate: 0.03
    max_iter: 1200
    max_leaf_nodes: 63
    min_samples_leaf: 8
    l2_regularization: 0.0

# Training Configuration
training:
  experiment_name: "house_price_prediction_test_2"
  run_name: "hgb_no_geo_tuned_v2"
  registry_model_name: "housing_price_predictor"
  model_output_dir: "models/production"
