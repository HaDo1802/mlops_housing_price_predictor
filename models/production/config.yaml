data:
  raw_data_path: data/raw/data_master.csv
  target_column: price
  test_size: 0.2
  val_size: 0.1
  random_state: 42
features:
  numeric:
  - bedrooms
  - bathrooms
  - livingarea
  categorical:
  - propertytype
  - vegas_district
preprocessing:
  handle_missing: mean
  handle_outliers: true
  outlier_method: iqr
  scale_features: true
  scaling_method: standard
  encode_categorical: true
  encoding_method: onehot
  target_transform: log1p
model:
  model_type: hist_gradient_boosting
  random_state: 42
  hyperparameters:
    learning_rate: 0.03
    max_iter: 1200
    max_leaf_nodes: 63
    min_samples_leaf: 8
    l2_regularization: 0.0
  cv_folds: 5
  optimize_metric: r2
training:
  experiment_name: house_price_prediction_test_2
  run_name: hgb_no_geo_tuned
  registry_model_name: housing_price_predictor
  log_metrics: true
  save_artifacts: true
  track_experiments: true
  model_output_dir: models/production
  log_dir: logs
