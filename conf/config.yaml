# Training configuration for the housing price model.

data:
  target_column: "price"
  test_size: 0.2
  val_size: 0.0
  random_state: 42

preprocessing:
  handle_missing: "mean"
  handle_outliers: true
  min_price: 100000               # Excludes likely land listings and price-entry errors.
  max_price: 5000000              # Excludes ultra-luxury homes outside the target segment.
  min_living_area: 500            # Excludes homes too small for the core market.
  exclude_property_types:
    - "MOBILE"                    # Different pricing dynamics from site-built homes.
  scale_features: true
  scaling_method: "standard"
  encode_categorical: true
  encoding_method: "onehot"
  target_transform: "log1p"       # Stabilizes variance for right-skewed sale prices.

model:
  model_type: "hist_gradient_boosting"
  random_state: 42
  hyperparameters:
    learning_rate: 0.03
    max_iter: 1200
    min_samples_leaf: 8

training:
  experiment_name: "house_price_prediction"
  run_name: "hgb_v1_new_features"
  registry_model_name: "housing_price_predictor"
  model_output_dir: "models/production"
