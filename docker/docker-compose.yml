version: "3.8"

services:
  fastapi:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: ml-fastapi
    ports:
      - "8000:8000"
    volumes:
      - ../models/production:/app/models/production:ro
      - ../logs:/app/logs
    environment:
      LOG_LEVEL: info
    restart: unless-stopped

  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streamlit
    container_name: ml-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ../models/production:/app/models/production:ro
      - ../logs:/app/logs
    environment:
      API_BASE_URL: http://fastapi:8000
      LOG_LEVEL: info
    restart: unless-stopped
