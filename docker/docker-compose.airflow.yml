# Usage:
#   1. Copy .env.example to .env and fill in all values
#   2. Generate fernet key:
#        python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#   3. Create required local dirs:
#        mkdir -p logs plugins data/snapshot models/production
#   4. Build and start:
#        docker compose -f docker/docker-compose.airflow.yml --env-file .env up --build -d
#   5. Open http://localhost:8080  (first start takes ~60s for init to finish)
#   6. To run only Airflow (not FastAPI/Streamlit):
#        docker compose -f docker/docker-compose.airflow.yml --env-file .env up -d
#   7. To run everything together:
#        docker compose -f docker/docker-compose.yml \
#                       -f docker/docker-compose.airflow.yml \
#                       --env-file .env up -d

x-airflow-common: &airflow-common
  image: custom-airflow:2.9.2-py312
  build:
    context: ..
    dockerfile: docker/Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_AIRFLOW_DB}

    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_WWW_USER:-admin}
    _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_WWW_PASSWORD:-change_me_ui}

    SUPABASE_DB_HOST: ${SUPABASE_DB_HOST}
    SUPABASE_DB_PORT: ${SUPABASE_DB_PORT:-5432}
    SUPABASE_DB_NAME: ${SUPABASE_DB_NAME}
    SUPABASE_DB_USER: ${SUPABASE_DB_USER}
    SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD}
    SUPABASE_DB_SSLMODE: ${SUPABASE_DB_SSLMODE}

    PYTHONPATH: /opt/airflow/project:/opt/airflow/project/src

    MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    MLFLOW_DEFAULT_ARTIFACT_ROOT: ${MLFLOW_DEFAULT_ARTIFACT_ROOT}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    ARTIFACT_BUCKET: ${ARTIFACT_BUCKET}
  volumes:
    - ../dags:/opt/airflow/dags
    - ../logs:/opt/airflow/logs
    - ../plugins:/opt/airflow/plugins
    - ../data:/opt/airflow/project/data
    - ../models:/opt/airflow/project/models
    - ../conf:/opt/airflow/project/conf:ro
    - ..:/opt/airflow/project
  depends_on:
    postgres:
      condition: service_healthy
  networks: [airflow-net]
  mem_limit: 2g
  cpus: '2.0'

services:
  postgres:
    image: postgres:15-alpine
    container_name: housing-airflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_AIRFLOW_DB}
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_AIRFLOW_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [airflow-net]
    mem_limit: 512m
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: housing-airflow-init
    entrypoint: /bin/bash
    restart: "no"
    command:
      - -c
      - |
          set -e
          echo "=== Waiting for DB ==="
          airflow db migrate
          echo "=== Creating admin user ==="
          airflow users create \
            --username "${AIRFLOW_WWW_USER:-admin}" \
            --password "${AIRFLOW_WWW_PASSWORD:-change_me_ui}" \
            --firstname Ha \
            --lastname Do \
            --role Admin \
            --email "${AIRFLOW_ADMIN_EMAIL:-admin@localhost}" \
            || echo "User already exists, skipping."
          echo "=== Init complete ==="
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: housing-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  airflow-scheduler:
    <<: *airflow-common
    container_name: housing-airflow-scheduler
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  airflow-postgres-data:

networks:
  airflow-net:
    driver: bridge
