services:
  - type: web
    name: housing-predictor-ui
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && pip install -e .
    startCommand: python -m streamlit run serving/app/streamlit_app.py --server.address=0.0.0.0 --server.port=$PORT --server.headless=true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.12
      - key: API_BASE_URL
        sync: false
