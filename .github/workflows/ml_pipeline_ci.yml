name: ml-pipeline-ci

on:
  push:
    branches: ["master"]
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "serving/**"
      - "dags/**"
      - "conf/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "Makefile"
  pull_request:
    branches: ["master"]
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "serving/**"
      - "dags/**"
      - "conf/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "Makefile"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  PYTHONPATH: ".:src"

jobs:
  quality-and-tests:
    name: Format, Lint, Test, Parse
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m pip install black flake8

      - name: Check formatting (black)
        run: |
          python -m black --check src data tests serving scripts dags

      - name: Lint (flake8)
        run: |
          python -m flake8 src data tests serving scripts dags --max-line-length 120 --extend-ignore=E501,E402,F401,F541,W291,W293

      - name: Run tests
        run: |
          python -m pytest tests -v --maxfail=1

      - name: Parse DAGs and key entrypoints
        run: |
          python -m py_compile dags/*.py
          python -m py_compile scripts/*.py
          python -m py_compile src/predictor/*.py
          python -m py_compile serving/api/*.py
          python -m py_compile serving/api/routers/*.py
          python -m py_compile serving/app/streamlit_app.py
