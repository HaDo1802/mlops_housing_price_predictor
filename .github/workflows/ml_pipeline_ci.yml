name: ml-pipeline-ci

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  PYTHON_VERSION: "3.12"
  PYTHONPATH: "src"

jobs:
  quality-and-tests:
    name: Install, Format Check, Lint, Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m pip install black flake8

      - name: Check formatting (black)
        run: |
          python -m black --check src data tests serving pipelines dags

      - name: Lint (flake8)
        run: |
          python -m flake8 src data tests serving pipelines dags --max-line-length 120 --extend-ignore=E501,E402,F401,F541,W291,W293

      - name: Run tests
        run: |
          python -m pytest tests -v --maxfail=1
